name: Publish URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: Paper, DOI, preprint, PubMed, or project URL
        required: true
        type: string
      title:
        description: Optional title override
        required: false
        type: string
      note:
        description: Optional curator note
        required: false
        type: string
      tags:
        description: Optional free-text tag hints
        required: false
        type: string
      code:
        description: Optional code, project, dataset, or benchmark URL
        required: false
        type: string
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: publish-url
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Publish paper metadata
        env:
          PAPER_URL: ${{ inputs.url }}
          PAPER_TITLE: ${{ inputs.title }}
          PAPER_NOTE: ${{ inputs.note }}
          PAPER_TAGS: ${{ inputs.tags }}
          PAPER_CODE: ${{ inputs.code }}
          REVIEWER: ${{ github.actor }}
        run: |
          args=(--url "$PAPER_URL" --reviewer "$REVIEWER" --fetch-metadata)
          if [ -n "$PAPER_TITLE" ]; then args+=(--title "$PAPER_TITLE"); fi
          if [ -n "$PAPER_NOTE" ]; then args+=(--note "$PAPER_NOTE"); fi
          if [ -n "$PAPER_TAGS" ]; then args+=(--tags "$PAPER_TAGS"); fi
          if [ -n "$PAPER_CODE" ]; then args+=(--code "$PAPER_CODE"); fi
          python scripts/publish_url.py "${args[@]}" | tee publish-result.txt
      - name: Generate docs
        run: python scripts/build_docs.py
      - name: Validate metadata
        run: python scripts/validate_papers.py
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build MkDocs site
        run: mkdocs build --strict
      - name: Commit direct publish
        id: commit
        run: |
          git add data README.md docs
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No repository changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish paper from URL"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Summary
        run: |
          {
            echo "## Publish URL"
            echo
            cat publish-result.txt
            echo
            echo "Repository changes committed: ${{ steps.commit.outputs.changed }}"
          } >> "$GITHUB_STEP_SUMMARY"
